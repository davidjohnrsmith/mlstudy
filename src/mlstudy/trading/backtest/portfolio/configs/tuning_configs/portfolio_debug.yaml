grid_name: "portfolio_grid_debug"

base_config:
  p_inc: 0.05
  p_dec: 0.10
  qty_step: 0.0
  min_qty_trade: 0.0
  min_fill_ratio: 0.0
  cooldown_mode: 0
  min_maturity_inc: 0.0
  maturity_bucket_bins: [2, 5, 7, 10]
  issuer_dv01_caps:
    Japan: 50.0
    US: 100.0
  mat_bucket_dv01_caps: [50.0, 50.0, 50.0, 50.0, 50.0]
  initial_capital: 1000000.0
  close_time: "none"

grid:
  z_inc: [2.0, 3.0]
  z_dec: [1.0]
  alpha_thr_inc: [1.0]
  alpha_thr_dec: [0.5]
  gross_dv01_cap: [100.0]
  cooldown_bars: [0]
  max_levels: [3]
  haircut: [1.0]
  top_k: [10]

data:
  book_filename: "book.parquet"
  mid_filename: "mid.parquet"
  dv01_filename: "dv01.parquet"
  signal_filename: "signal.parquet"
  meta_filename: "meta.parquet"
  hedge_ratio_filename: "hedge_ratios.parquet"

sweep:
  backend: "serial"
  n_workers: 1
  chunk_size: 50
  mode: "metrics_only"
  keep_top_k_full: 5

rank:
  primary_metrics:
    - ["total_pnl", 0.5]
    - ["sharpe_ratio", 0.5]
  tie_metrics:
    - ["max_drawdown", 1.0]
  primary_params:
    - ["z_inc", 1.0]
  tie_params:
    - ["alpha_thr_inc", 1.0]
