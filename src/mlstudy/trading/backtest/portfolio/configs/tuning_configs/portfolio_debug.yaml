grid_name: "portfolio_grid_debug"

base_config:
  use_greedy: false
  p_inc: 0.05
  p_dec: 0.10
  min_fill_ratio: 0.0
  cooldown_mode: 0
  min_maturity_inc: 0.0
  maturity_bucket_bins: [2, 5, 7, 10]
  issuer_dv01_caps:
    Japan: 50.0
    US: 100000000000000.0
  mat_bucket_dv01_caps: [50000.0, 500000.0, 50000.0, 500000.0, 5000000.0]
  initial_capital: 1000.0
  close_time: "17:00"

grid:
  z_inc: [0.5, 1.0]
  z_dec: [0.1]
  alpha_thr_inc: [1.0]
  alpha_thr_dec: [0.5]
  gross_dv01_cap: [100.0]
  cooldown_bars: [0]
  max_levels: [3]
  haircut: [1.0]
  top_k: [10]

data:
  book_filename: "book"
  mid_filename: "mid"
  dv01_filename: "dv01"
  signal_filename: "signal"
  meta_filename: "meta.parquet"
  hedge_ratio_filename: "hedge_ratios"
  hedge_meta_filename: "hedge_meta.parquet"

sweep:
  backend: "serial"
  n_workers: 1
  chunk_size: 50
  mode: "metrics_only"
  keep_top_k_full: 5
  chunk_freq: "D"
  start_date: "20260101"
  end_date: "20260104"

plot:
  inactive_start: "16:30"
  inactive_end: "08:30"

rank:
  primary_metrics:
    - ["total_pnl", 0.5]
    - ["sharpe_ratio", 0.5]
  tie_metrics:
    - ["max_drawdown", 1.0]
  primary_params:
    - ["z_inc", 1.0]
  tie_params:
    - ["alpha_thr_inc", 1.0]
